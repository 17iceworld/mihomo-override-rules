rule-providers:
  private-domain:
    type: inline
    behavior: domain
    payload:
      - "localhost"
      - "*.local"
      - "*.lan"
      - "*.home.arpa"
  private-ip:
    type: inline
    behavior: ipcidr
    payload:
      - "0.0.0.0/8"
      - "10.0.0.0/8"
      - "100.64.0.0/10"
      - "127.0.0.0/8"
      - "169.254.0.0/16"
      - "172.16.0.0/12"
      - "192.0.0.0/24"
      - "192.0.2.0/24"
      - "192.168.0.0/16"
      - "198.18.0.0/15"
      - "198.51.100.0/24"
      - "203.0.113.0/24"
      - "224.0.0.0/4"
      - "240.0.0.0/4"
  direct-domain:
    type: inline
    behavior: domain
    payload-from: rules/direct.yaml
  ai-domain:
    type: inline
    behavior: domain
    payload-from: rules/ai.yaml
  ads-lite:
    type: http
    behavior: classical
    format: text
    path: ./ruleset/ads-lite.list
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
    interval: 86400
  ads-custom:
    type: inline
    behavior: classical
    payload-from: rules/ads.yaml
  cn-domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/geosite-cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs
    path-in-bundle: geo/geosite/cn.mrs
    interval: 86400
  cn-ip:
    type: http
    behavior: ipcidr
    format: mrs
    path: ./ruleset/geoip-cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs
    path-in-bundle: geo/geoip/cn.mrs
    interval: 86400
