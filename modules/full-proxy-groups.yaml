proxy-groups:
  - name: "[AUTO] Auto"
    type: url-test
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/auto.png?v=d670e50
    include-all: true
    exclude-type: direct
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true
  - name: "[PROXY] PROXY"
    type: select
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/proxy.png?v=d670e50
    include-all: true
    proxies:
      - "[AUTO] Auto"
      - DIRECT
  - name: "[AI] AI"
