proxy-groups:
  - name: "Auto"
    type: url-test
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/auto.png?v=d670e50
    include-all: true
    exclude-type: direct
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true
  - name: "PROXY"
    type: select
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/proxy.png?v=d670e50
    include-all: true
    proxies:
      - "Auto"
  - name: "AI"
    type: select
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/ai.png?v=d670e50
    proxies:
      - "PROXY"
      - "Auto"
    include-all: true
  - name: "AdBlock"
    type: select
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/adblock.png?v=d670e50
    proxies:
