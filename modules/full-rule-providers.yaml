rule-providers:
  private-domain:
    type: inline
    behavior: domain
    payload:
      - "localhost"
      - "*.local"
      - "*.lan"
      - "*.home.arpa"
  private-ip:
    type: inline
    behavior: ipcidr
    payload:
      - "0.0.0.0/8"
      - "10.0.0.0/8"
      - "100.64.0.0/10"
      - "127.0.0.0/8"
      - "169.254.0.0/16"
      - "172.16.0.0/12"
      - "192.0.0.0/24"
      - "192.0.2.0/24"
      - "192.168.0.0/16"
      - "198.18.0.0/15"
      - "198.51.100.0/24"
      - "203.0.113.0/24"
      - "224.0.0.0/4"
      - "240.0.0.0/4"
  direct-cn-domain:
    type: inline
    behavior: domain
    payload-from: rules/direct-cn.yaml
  direct-global-domain:
    type: inline
    behavior: domain
    payload-from: rules/direct-global.yaml
  ai-domain:
    type: inline
    behavior: domain
    payload-from: rules/ai.yaml
  x-domain:
    type: inline
    behavior: domain
    payload-from: rules/x.yaml
  instagram-domain:
    type: inline
    behavior: domain
    payload-from: rules/instagram.yaml
  reddit-domain:
    type: inline
    behavior: domain
    payload-from: rules/reddit.yaml
  category-ads-all:
