allow-lan: false
ipv6: true
mode: rule
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.home.arpa"
    - "localhost.ptlogin2.qq.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.ntp.org"
    - "+.pool.ntp.org"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.apple.com"
    - "time.asia.apple.com"
    - "+.push.apple.com"
    - "+.push-apple.com.akadns.net"
    - "+.itunes.apple.com"
    - "+.mzstatic.com"
    - "+.cdn-apple.com"
    - "+.apple-dns.net"
    - "+.windowsupdate.com"
    - "+.update.microsoft.com"
    - "+.dl.delivery.mp.microsoft.com"
    - "+.delivery.mp.microsoft.com"
    - "+.xboxlive.com"
    - "+.xboxservices.com"
    - "+.playstation.net"
    - "+.playstationnetwork.com"
    - "+.nintendo.net"
    - "+.nintendo.com"
    - "+.steampowered.com"
    - "+.steamcontent.com"
    - "+.steamserver.net"
    - "+.epicgames.com"
    - "+.bank"
    - "+.cmbchina.com"
    - "+.95516.com"
    - "+.unionpay.com"
    - "+.alipay.com"
    - "+.tenpay.com"
    - "+.weixin.qq.com"
  default-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
  direct-nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
  direct-nameserver-follow-policy: true
  nameserver:
    - https://cloudflare-dns.com/dns-query#PROXY
    - https://dns.google/dns-query#PROXY
  nameserver-policy:
    "rule-set:private-domain":
      - https://dns.alidns.com/dns-query#DIRECT
      - https://doh.pub/dns-query#DIRECT
    "rule-set:direct-cn-domain":
