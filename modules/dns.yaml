allow-lan: false
ipv6: true
mode: rule
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.home.arpa"
    - "localhost.ptlogin2.qq.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
  default-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
  direct-nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
  direct-nameserver-follow-policy: true
  nameserver:
    - https://cloudflare-dns.com/dns-query#PROXY
    - https://dns.google/dns-query#PROXY
  nameserver-policy:
    "rule-set:private-domain":
      - https://dns.alidns.com/dns-query#DIRECT
      - https://doh.pub/dns-query#DIRECT
    "rule-set:direct-cn-domain":
      - https://dns.alidns.com/dns-query#DIRECT
      - https://doh.pub/dns-query#DIRECT
    "rule-set:direct-global-domain":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:cn-domain":
      - https://dns.alidns.com/dns-query#DIRECT
      - https://doh.pub/dns-query#DIRECT
    "rule-set:geolocation-cn":
      - https://dns.alidns.com/dns-query#DIRECT
      - https://doh.pub/dns-query#DIRECT
    "rule-set:ai-domain":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:category-ai-!cn":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:openai":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:youtube":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:google":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:telegram":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:github":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:gitlab":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "rule-set:geolocation-!cn":
      - https://cloudflare-dns.com/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
