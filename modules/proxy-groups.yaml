proxy-groups:
  - name: PROXY
    type: select
    include-all: true
    proxies:
      - DIRECT
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true
  - name: AI
    type: select
    proxies:
      - PROXY
      - DIRECT
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true
  - name: AdBlock
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: Final
    type: select
    proxies:
      - PROXY
      - DIRECT
