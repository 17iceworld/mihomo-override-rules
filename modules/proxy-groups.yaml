proxy-groups:
  - name: "[AUTO] Auto"
    type: url-test
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/auto.png
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true
  - name: "[PROXY] PROXY"
    type: select
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/proxy.png
    include-all: true
    proxies:
      - "[AUTO] Auto"
      - DIRECT
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true
  - name: "[AI] AI"
    type: select
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/ai.png
    proxies:
      - "[PROXY] PROXY"
      - "[AUTO] Auto"
      - DIRECT
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true
  - name: "[AD] AdBlock"
    type: select
    icon: https://raw.githubusercontent.com/17iceworld/mihomo-override-rules/main/icons/adblock.png
    proxies:
