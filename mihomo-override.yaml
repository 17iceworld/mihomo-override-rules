# Generated by scripts/build-override.js.
# Edit files under modules/ and rules/ instead.
ipv6: false
mode: rule
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.home.arpa"
    - "localhost.ptlogin2.qq.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://1.1.1.1/dns-query
  nameserver-policy:
    "rule-set:private-domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:direct-domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:cn-domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:ai-domain":
      - https://cloudflare-dns.com/dns-query
      - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.x.com"
      - "+.twitter.com"

proxy-groups:
  - name: PROXY
    type: select
    include-all: true
    proxies:
      - DIRECT
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true
  - name: AI
    type: select
    proxies:
      - PROXY
      - DIRECT
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true
  - name: AdBlock
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: Final
    type: select
    proxies:
      - PROXY
      - DIRECT

rule-providers:
  private-domain:
    type: inline
    behavior: domain
    payload:
      - "localhost"
      - "*.local"
      - "*.lan"
      - "*.home.arpa"
  private-ip:
    type: inline
    behavior: ipcidr
    payload:
      - "0.0.0.0/8"
      - "10.0.0.0/8"
      - "100.64.0.0/10"
      - "127.0.0.0/8"
      - "169.254.0.0/16"
      - "172.16.0.0/12"
      - "192.0.0.0/24"
      - "192.0.2.0/24"
      - "192.168.0.0/16"
      - "198.18.0.0/15"
      - "198.51.100.0/24"
      - "203.0.113.0/24"
      - "224.0.0.0/4"
      - "240.0.0.0/4"
  direct-domain:
    type: inline
    behavior: domain
    payload:
      - "localhost"
      - "*.local"
      - "*.lan"
      - "*.home.arpa"
      - ".cn"
      - ".中国"
      - ".中國"
  ai-domain:
    type: inline
    behavior: domain
    payload:
      - ".openai.com"
      - ".chatgpt.com"
      - ".oaistatic.com"
      - ".oaiusercontent.com"
      - ".openaiapi-site.azureedge.net"
      - ".anthropic.com"
      - ".claude.ai"
      - ".claudeusercontent.com"
      - "gemini.google.com"
      - "generativelanguage.googleapis.com"
      - "ai.google.dev"
      - ".perplexity.ai"
      - ".poe.com"
      - "copilot.microsoft.com"
      - ".githubcopilot.com"
      - ".githubnext.com"
  ads-lite:
    type: http
    behavior: classical
    format: text
    path: ./ruleset/ads-lite.list
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
    interval: 86400
  ads-custom:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,adservice.google.com
      - DOMAIN-SUFFIX,ads.google.com
      - DOMAIN-SUFFIX,doubleclick.net
      - DOMAIN-SUFFIX,googlesyndication.com
      - DOMAIN-SUFFIX,googleadservices.com
      - DOMAIN-SUFFIX,google-analytics.com
      - DOMAIN-SUFFIX,analytics.google.com
      - DOMAIN-SUFFIX,umeng.com
      - DOMAIN-SUFFIX,umengcloud.com
      - DOMAIN-SUFFIX,cnzz.com
      - DOMAIN-SUFFIX,hm.baidu.com
  cn-domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/geosite-cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs
    path-in-bundle: geo/geosite/cn.mrs
    interval: 86400
  cn-ip:
    type: http
    behavior: ipcidr
    format: mrs
    path: ./ruleset/geoip-cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs
    path-in-bundle: geo/geoip/cn.mrs
    interval: 86400

rules:
  - RULE-SET,private-domain,DIRECT
  - RULE-SET,private-ip,DIRECT,no-resolve
  - RULE-SET,ads-custom,AdBlock
  - RULE-SET,ads-lite,AdBlock
  - RULE-SET,ai-domain,AI
  - RULE-SET,direct-domain,DIRECT
  - RULE-SET,cn-domain,DIRECT
  - RULE-SET,cn-ip,DIRECT,no-resolve
  - MATCH,Final
